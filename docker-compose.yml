# Docker Compose configuration for LLM Trading Analyzer
# Production deployment: 阿里云 / 宝塔 Linux
#
# 复制 .env.example 为 .env，填写以下必填变量后执行 docker compose up -d：
#   SECRET_KEY        → python3 -c "import secrets; print(secrets.token_hex(32))"
#   ADMIN_TOKEN       → python3 -c "import secrets; print(secrets.token_hex(24))"
#   LLM_API_KEY       → DeepSeek / OpenAI API key
#   POSTGRES_PASSWORD → 数据库密码
#
# LLM provider/model、爱发电套餐、定价等配置在 backend/initial_settings.json（首次启动写入DB）。
# 无需配置 NEXT_PUBLIC_API_URL —— 前端通过 Next.js rewrites 在服务端代理 /api/* 到 backend 容器

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-trader}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - trader-network

  # Redis — task queue + result cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trader-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-trader}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - LLM_API_KEY=${LLM_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - AFDIAN_USER_ID=${AFDIAN_USER_ID:-}
      - AFDIAN_API_TOKEN=${AFDIAN_API_TOKEN:-}
      - AFDIAN_WEBHOOK_TOKEN=${AFDIAN_WEBHOOK_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - trader-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # 运行时变量：Next.js rewrites 用它代理 /api/* 到 backend
      # Docker 内部网络直接用服务名访问，无需公网域名
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - trader-network

  # Data Collector — periodically fetches market bars into PostgreSQL.
  # The backend API reads from the DB first; AKShare is only called as a
  # fallback when the DB has no data for a given symbol.
  #
  # Configure the watchlist via: POST /api/admin/watchlist
  # Monitor status via:          GET  /api/admin/market-data/status
  # Trigger manual refresh via:  POST /api/admin/market-data/refresh
  data-collector:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "src.services.data.data_collector"]
    volumes:
      - backend_logs:/app/logs
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-trader}
      # How often the scheduler wakes to check trading hours / run intraday refresh (minutes)
      - COLLECTOR_INTRADAY_INTERVAL_MINUTES=${COLLECTOR_INTRADAY_INTERVAL_MINUTES:-5}
      # Sleep between AKShare calls during intraday refresh (seconds, shorter = fresher data)
      - COLLECTOR_INTRADAY_REQUEST_SLEEP=${COLLECTOR_INTRADAY_REQUEST_SLEEP:-1.0}
      # Sleep between AKShare calls during EOD/history refresh (seconds)
      - COLLECTOR_REQUEST_SLEEP=${COLLECTOR_REQUEST_SLEEP:-2.0}
      # Days of history to pull on a cold start (no existing data)
      - COLLECTOR_HISTORY_DAYS=${COLLECTOR_HISTORY_DAYS:-730}
      # Minutes after market close before running EOD daily-bar refresh
      - COLLECTOR_EOD_DELAY_MINUTES=${COLLECTOR_EOD_DELAY_MINUTES:-30}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-network

  # arq Worker — runs LLM analysis tasks asynchronously
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "src.worker.main"]
    volumes:
      - backend_logs:/app/logs
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-trader}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - LLM_API_KEY=${LLM_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trader-network

volumes:
  postgres_data:
  backend_data:
  backend_logs:
  redis_data:

networks:
  trader-network:
    driver: bridge
