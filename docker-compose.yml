# Docker Compose configuration for LLM Trading Analyzer
# Production deployment: 阿里云 / 宝塔 Linux
#
# 复制 .env.example 为 .env，填写以下必填变量后执行 docker compose up -d：
#   SECRET_KEY        → python3 -c "import secrets; print(secrets.token_hex(32))"
#   ADMIN_TOKEN       → python3 -c "import secrets; print(secrets.token_hex(24))"
#   LLM_API_KEY       → DeepSeek / OpenAI API key
#   POSTGRES_PASSWORD → 数据库密码
#
# LLM provider/model、爱发电套餐、定价等配置在 backend/initial_settings.json（首次启动写入DB）。
# 无需单独配置 API 地址 —— 前端构建时通过 build arg NUXT_PUBLIC_API_BASE 注入，指向 backend 容器

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-trader}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - trader-network

  # Redis — task queue + result cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trader-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-trader}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-trader}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - LLM_API_KEY=${LLM_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - AFDIAN_USER_ID=${AFDIAN_USER_ID:-}
      - AFDIAN_API_TOKEN=${AFDIAN_API_TOKEN:-}
      - AFDIAN_WEBHOOK_TOKEN=${AFDIAN_WEBHOOK_TOKEN:-}
      - COLLECTOR_REQUEST_SLEEP=${COLLECTOR_REQUEST_SLEEP:-2.0}
      - COLLECTOR_HISTORY_DAYS=${COLLECTOR_HISTORY_DAYS:-730}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - trader-network

  # Frontend (Nuxt 3)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      # 运行时注入：Nuxt server routeRules 在启动时读取此变量，代理 /api/** → backend
      - BACKEND_URL=http://backend:8000
      # 站点公网域名，用于 sitemap.xml / robots.txt 生成绝对 URL（避免被 nginx 探针改成 127.0.0.1）
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - trader-network

  # Cloudflare Tunnel — 公网接入（可选，profile=tunnel 时启用）
  # cloudflared 主动向外拨号到 Cloudflare 边缘，无需开放 80/443、无需公网 IP、无需管理 TLS 证书。
  # 启用方式：在 .env 配置 CLOUDFLARE_TUNNEL_TOKEN；deploy.sh 检测到 token 时自动激活该 profile。
  # 在 Cloudflare Zero Trust 后台为该 tunnel 添加 Public Hostname → Service 填 http://frontend:3000。
  cloudflared:
    image: docker.m.daocloud.io/cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - frontend
    networks:
      - trader-network
    profiles:
      - tunnel

volumes:
  postgres_data:
  backend_data:
  backend_logs:
  redis_data:

networks:
  trader-network:
    driver: bridge
