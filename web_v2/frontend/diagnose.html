<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端诊断工具</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-section {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
        }
        .test-section h2 {
            margin-top: 0;
            color: #3b82f6;
        }
        .status {
            padding: 8px 16px;
            border-radius: 4px;
            display: inline-block;
            font-weight: bold;
            margin: 5px 0;
        }
        .status.success { background: #22c55e; color: white; }
        .status.error { background: #ef4444; color: white; }
        .status.warning { background: #f59e0b; color: white; }
        .status.info { background: #3b82f6; color: white; }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #2563eb;
        }
        pre {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            border: 1px solid #3a3a3a;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 4px;
            border: 1px solid #3a3a3a;
        }
    </style>
</head>
<body>
    <h1>🔍 前端诊断工具</h1>
    <p>这个工具将帮助你诊断前端黑屏问题</p>

    <!-- 测试1: 后端连接 -->
    <div class="test-section">
        <h2>1️⃣ 后端 API 连接测试</h2>
        <button onclick="testBackendAPI()">测试后端连接</button>
        <div id="api-result" class="result" style="display:none;"></div>
    </div>

    <!-- 测试2: WebSocket连接 -->
    <div class="test-section">
        <h2>2️⃣ WebSocket 连接测试</h2>
        <button onclick="testWebSocket()">测试 WebSocket</button>
        <button onclick="disconnectWebSocket()">断开 WebSocket</button>
        <div id="ws-result" class="result" style="display:none;"></div>
    </div>

    <!-- 测试3: 数据获取 -->
    <div class="test-section">
        <h2>3️⃣ 数据接口测试</h2>
        <button onclick="testKlineData()">测试K线数据</button>
        <button onclick="testAccountData()">测试账户数据</button>
        <div id="data-result" class="result" style="display:none;"></div>
    </div>

    <!-- 测试4: 前端资源 -->
    <div class="test-section">
        <h2>4️⃣ 前端资源检查</h2>
        <div id="resource-result" class="result">
            <div>页面加载完成: <span class="status success">✓ 正常</span></div>
            <div>用户代理: <code style="color: #9ca3af;">${navigator.userAgent}</code></div>
            <div>视口尺寸: <code style="color: #9ca3af;">${window.innerWidth} x ${window.innerHeight}</code></div>
        </div>
    </div>

    <script>
        let ws = null;

        // 测试后端API
        async function testBackendAPI() {
            const result = document.getElementById('api-result');
            result.style.display = 'block';
            result.innerHTML = '<span class="status info">测试中...</span>';

            try {
                const response = await fetch('http://localhost:8000/api/system/health');
                const data = await response.json();

                if (response.ok) {
                    result.innerHTML = `
                        <span class="status success">✓ 后端连接正常</span>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    result.innerHTML = `
                        <span class="status error">✗ 后端返回错误</span>
                        <pre>状态码: ${response.status}\n${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                result.innerHTML = `
                    <span class="status error">✗ 无法连接到后端</span>
                    <pre>错误: ${error.message}</pre>
                    <p>💡 请确保后端服务正在运行: <code>python start_web_v2.py</code></p>
                `;
            }
        }

        // 测试WebSocket
        function testWebSocket() {
            const result = document.getElementById('ws-result');
            result.style.display = 'block';
            result.innerHTML = '<span class="status info">连接中...</span>';

            try {
                ws = new WebSocket('ws://localhost:8000/ws');

                ws.onopen = () => {
                    result.innerHTML = `
                        <span class="status success">✓ WebSocket 连接成功</span>
                        <p>连接状态: OPEN (${ws.readyState})</p>
                    `;
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    const currentContent = result.innerHTML;
                    result.innerHTML = currentContent + `
                        <div style="margin-top: 10px; border-top: 1px solid #3a3a3a; padding-top: 10px;">
                            <strong>收到消息:</strong>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                };

                ws.onerror = (error) => {
                    result.innerHTML = `
                        <span class="status error">✗ WebSocket 连接错误</span>
                        <pre>${error}</pre>
                    `;
                };

                ws.onclose = (event) => {
                    if (event.code !== 1000) {
                        result.innerHTML = `
                            <span class="status warning">WebSocket 连接关闭</span>
                            <pre>代码: ${event.code}\n原因: ${event.reason || '未知'}</pre>
                        `;
                    }
                };
            } catch (error) {
                result.innerHTML = `
                    <span class="status error">✗ WebSocket 创建失败</span>
                    <pre>${error.message}</pre>
                `;
            }
        }

        function disconnectWebSocket() {
            if (ws) {
                ws.close(1000, '手动关闭');
                const result = document.getElementById('ws-result');
                result.innerHTML = '<span class="status info">已手动断开连接</span>';
            }
        }

        // 测试K线数据
        async function testKlineData() {
            const result = document.getElementById('data-result');
            result.style.display = 'block';
            result.innerHTML = '<span class="status info">获取K线数据...</span>';

            try {
                const response = await fetch('http://localhost:8000/api/kline/1m?limit=10');
                const data = await response.json();

                if (response.ok && data.code === 200) {
                    const klines = data.data?.klines || [];
                    result.innerHTML = `
                        <span class="status success">✓ K线数据获取成功</span>
                        <p>数据条数: ${klines.length}</p>
                        <pre>${JSON.stringify(klines.slice(0, 3), null, 2)}</pre>
                    `;
                } else {
                    result.innerHTML = `
                        <span class="status error">✗ K线数据获取失败</span>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                result.innerHTML = `
                    <span class="status error">✗ 请求失败</span>
                    <pre>${error.message}</pre>
                `;
            }
        }

        // 测试账户数据
        async function testAccountData() {
            const result = document.getElementById('data-result');
            result.style.display = 'block';
            result.innerHTML = '<span class="status info">获取账户数据...</span>';

            try {
                const response = await fetch('http://localhost:8000/api/account/info');
                const data = await response.json();

                if (response.ok && data.code === 200) {
                    result.innerHTML = `
                        <span class="status success">✓ 账户数据获取成功</span>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    result.innerHTML = `
                        <span class="status error">✗ 账户数据获取失败</span>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                result.innerHTML = `
                    <span class="status error">✗ 请求失败</span>
                    <pre>${error.message}</pre>
                `;
            }
        }

        // 页面加载时自动运行检查
        window.addEventListener('load', () => {
            console.log('✓ 诊断页面加载完成');
        });
    </script>
</body>
</html>
