[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3

[program:api]
command=uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 1
directory=/app
autostart=true
autorestart=true
stderr_logfile=/app/logs/api.err.log
stdout_logfile=/app/logs/api.out.log

[program:worker]
command=python -m src.worker.main
directory=/app
autostart=true
autorestart=true
stderr_logfile=/app/logs/worker.err.log
stdout_logfile=/app/logs/worker.out.log

[program:data-collector]
command=python -m src.services.data.data_collector
directory=/app
autostart=true
autorestart=true
stderr_logfile=/app/logs/collector.err.log
stdout_logfile=/app/logs/collector.out.log
